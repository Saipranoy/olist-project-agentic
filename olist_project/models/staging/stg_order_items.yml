version: 2

models:
  - name: stg_order_items
    description: "One row per line item within an order."
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: product_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_products')
              field: product_id
      - name: price
        tests:
          - not_null
